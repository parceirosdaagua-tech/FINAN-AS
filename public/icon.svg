<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)" />
  <rect width="496" height="496" x="8" y="8" rx="120" fill="none" stroke="#27272a" stroke-width="6" />
  
  <!-- Glowing central shield -->
  <g filter="url(#glow)">
    <!-- Shield / Diamond shape representing security & gold -->
    <path d="M256 80 L400 180 L400 340 L256 440 L112 340 L112 180 Z" fill="none" stroke="url(#gold)" stroke-width="12" stroke-linejoin="round" opacity="0.95" />
    
    <!-- Central Dollar Sign styled as Staff/Principal Software Engineer Logo -->
    <path d="M256 120 L256 392" stroke="url(#emerald)" stroke-width="20" stroke-linecap="round" />
    
    <!-- S curved path for $ -->
    <path d="M310 180 C310 150, 202 140, 202 210 C202 280, 310 270, 310 330 C310 390, 202 370, 202 340" fill="none" stroke="url(#emerald)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Small accent star of success -->
  <path d="M256 40 L262 55 L278 55 L265 65 L270 80 L256 70 L242 80 L247 65 L234 55 L250 55 Z" fill="url(#gold)" />
</svg>
